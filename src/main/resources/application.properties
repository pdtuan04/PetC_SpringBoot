spring.application.name=phandinhtuan

# Database connection
spring.datasource.url=jdbc:mysql://localhost:3306/PetC?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB


spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

jobrunr.background-job-server.enabled=true
jobrunr.dashboard.enabled=true
jobrunr.dashboard.port=8000

# Google OAuth2 Config
google.client.id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.scope=email,profile

# Payment - MoMo
payment.momo.partner-code=${MOMO_PARTNER_CODE:}
payment.momo.access-key=${MOMO_ACCESS_KEY:}
payment.momo.secret-key=${MOMO_SECRET_KEY:}
payment.momo.request-type=${MOMO_REQUEST_TYPE:captureWallet}
payment.momo.endpoint=${MOMO_ENDPOINT:https://test-payment.momo.vn/v2/gateway/api/create}
payment.momo.redirect-url=${MOMO_REDIRECT_URL:https://localhost:5173/payment/momo/return}
payment.momo.ipn-url=${MOMO_IPN_URL:http://localhost:8080/api/payments/momo/webhook}
payment.momo.partner-name=${MOMO_PARTNER_NAME:PetC}
payment.momo.store-id=${MOMO_STORE_ID:PetCStore}

# Payment - VNPay
payment.vnpay.tmn-code=${VNPAY_TMN_CODE:}
payment.vnpay.hash-secret=${VNPAY_HASH_SECRET:}
payment.vnpay.pay-url=${VNPAY_PAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
payment.vnpay.return-url=${VNPAY_RETURN_URL:https://localhost:5173/payment/vnpay/return}